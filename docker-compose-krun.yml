services:
  spr-algo:
    extends:
      file: docker-compose.yml
      service: spr-algo
    runtime: ${SPR_KRUN_RUNTIME:-spr-krun}
    network_mode: host
    networks: !reset []
    annotations:
      krun.cpus: "${SPR_KRUN_CPUS:-2}"
      krun.ram_mib: "${SPR_KRUN_RAM_MIB:-1024}"
      krun.tap_name: "kalgo0"
      krun.net_mac: "${SPR_KRUN_MAC:-02:53:50:52:4b:03}"
      krun.vsock_path: "/state/plugins/spr-algo/socket"
      krun.vsock_port: "4040"
    environment:
      SPR_KRUN_PLUGIN_SOCKET: "/run/spr-krun-plugin/spr-algo.sock"
      SPR_KRUN_VSOCK_PORT: "4040"
    devices:
      - "/dev/net/tun:/dev/net/tun"
